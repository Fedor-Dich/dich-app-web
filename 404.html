<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketGroove Beat</title>
    <!-- Подключаем шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Общие стили для консистентности */
        body {
            background-color: #1E1F22;
            color: #CED0D6;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
             min-height: 100vh; /* Для старых браузеров */
    min-height: 100dvh; /* Динамическая высота (учитывает панели браузера) */
            margin: 0;
            text-align: center;
        }

        /* Центральный блок */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container { 
            max-width: 600px;
            width: 100%;
        }

        /* КОНСИСТЕНТНЫЙ ЗАГОЛОВОК (как в app-pg.html) */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .app-logo {
            width: 60px;
            height: 60px;
            border-radius: 14px;
        }

        h1 { 
            font-size: 2.9em; 
            color: #CED0D6; 
            margin: 0; 
            font-weight: 600;
        }

        .message { 
            line-height: 1.4; 
            font-size: 1em; 
            margin: 0 auto 10px;
            color: #BCBEC4;
            max-width: 500px;
        }

        /* Ссылка "Подробнее" — кликабельна целиком */
        .details-link-container {
            margin-bottom: 40px;
        }

        .details-link {
            font-size: 1em;
            color: #5B9BD5;
            text-decoration: none;
            transition: color 0.2s;
        }

        .details-link:hover {
            color: #82B1FF;
            text-decoration: underline;
        }

        /* Блок загрузки (как в app-pg) */
        .download-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .play-store-btn {
            background-color: transparent;
            border: 2px solid #5B9BD5; 
            color: #5B9BD5;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            transition: transform 0.1s, background-color 0.1s, border-color 0.1s;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box; 
        }

        .play-store-btn:active {
            transform: scale(0.96);
            background-color: #4A82B5; 
            border-color: #4A82B5;     
            color: #CED0D6;            
        }

        .other-stores {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .store-link {
            color: #5B9BD5;
            text-decoration: none;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .store-link:hover, .store-link:active {
            color: #82B1FF;
            text-decoration: underline;
        }

        /* Футер */
        footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
        }

        footer a {
            color: #5B9BD5;
            text-decoration: none;
            font-size: 0.9em;
        }

        footer a:hover, footer a:active {
            color: #82B1FF;
            text-decoration: underline;
        }

        .copyright {
            color: #a0a2a8;
            font-size: 0.9em;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 600px) {
            h1 { font-size: 2.2em; }
            .app-logo { width: 45px; height: 45px; border-radius: 10px; }
            .app-header { gap: 10px; }
        }
    </style>
</head>
<body>

    <main>
        <div class="container">
            <!-- Заголовок с логотипом (как на основной странице) -->
            <div class="app-header">
                <img src="images/pocketgroove/ic_launcher.svg" alt="PocketGroove Logo" class="app-logo">
                <h1>PocketGroove</h1>
            </div>

            <!-- Текст сообщения -->
            <p id="message" class="message">You've been sent a beat in PocketGroove! To open it, install the app and then follow the link again.</p>
            
            <!-- Ссылка на страницу приложения (кликабельна целиком) -->
            <div class="details-link-container">
                <a href="app-pg.html" id="details-link" class="details-link">More about PocketGroove →</a>
            </div>

            <div class="download-container">
                <a id="btn-main" href="https://www.rustore.ru/catalog/app/com.fedordich.pocketgroove" class="play-store-btn">Download App</a>
                
                <div class="other-stores">
                    <a href="#" class="store-link">AppGallery</a>
                    <a href="#" class="store-link">Galaxy Store</a>
                    <a href="#" class="store-link">GetApps</a>
                    <a id="apk-link" href="downloads/pocketgroove.apk" class="store-link">Download .APK</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="copyright">
            &copy; 2026 <a href="index.html">DichApp Studio</a>. All rights reserved.
        </div>
    </footer>

    <script>
        const path = window.location.pathname;

        // Перенаправление на главную, если путь некорректен
        if (!path.includes('pocketgroove')) {
            window.location.href = 'index.html';
        }

        const translations = {
            'ru': {
                message: 'Вам прислали бит в PocketGroove! Чтобы его открыть, установите приложение, а затем снова перейдите по ссылке.',
                details: 'Подробнее о PocketGroove →',
                btn: 'Доступно в RuStore',
                apk: 'Скачать .APK'
            },
            'de': {
                message: 'Dir wurde ein Beat in PocketGroove gesendet! Um ihn zu öffnen, installiere die App und folge dann erneut dem Link.',
                details: 'Mehr über PocketGroove →',
                btn: 'Bei RuStore herunterladen',
                apk: '.APK herunterladen'
            },
            'es': {
                message: '¡Te han enviado un beat en PocketGroove! Para abrirlo, instala la aplicación y luego vuelve a seguir el enlace.',
                details: 'Más sobre PocketGroove →',
                btn: 'Consíguelo en RuStore',
                apk: 'Descargar .APK'
            },
            'fr': {
                message: 'On vous a envoyé un beat dans PocketGroove ! Pour l\'ouvrir, installez l\'application puis suivez à nouveau le lien.',
                details: 'En savoir plus sur PocketGroove →',
                btn: 'Disponible sur RuStore',
                apk: 'Télécharger .APK'
            },
            'hi': {
                message: 'आपको PocketGroove में एक बीट भेजी गई है! इसे खोलने के लिए, ऐप इंस्टॉल करें और फिर से लिंक पर जाएं।',
                details: 'PocketGroove के बारे में и जानें →',
                btn: 'RuStore से प्राप्त करें',
                apk: '.APK डाउनलोड करें'
            },
            'it': {
                message: 'Ti è stato inviato un beat in PocketGroove! Per aprirlo, installa l\'app e poi segui di nuovo il link.',
                details: 'Scopri di più su PocketGroove →',
                btn: 'Scarica su RuStore',
                apk: 'Scarica .APK'
            },
            'pt': {
                message: 'Enviaram-te um beat no PocketGroove! Para o abrires, instala a aplicação e depois volta a aceder ao link.',
                details: 'Saiba mais sobre PocketGroove →',
                btn: 'Obter no RuStore',
                apk: 'Descarregar .APK'
            },
            'zh': {
                message: '有人在 PocketGroove 中给你发了一个节奏！要打开 it，请安装该应用，然后再次访问链接。',
                details: '了解更多关于 PocketGroove →',
                btn: '在 RuStore 下载',
                apk: '下载 .APK'
            }
        };

        const userLang = navigator.language.split('-')[0]; 
        if (translations[userLang]) {
            document.getElementById('message').innerText = translations[userLang].message;
            document.getElementById('details-link').innerText = translations[userLang].details;
            document.getElementById('btn-main').innerText = translations[userLang].btn;
            document.getElementById('apk-link').innerText = translations[userLang].apk;
        }
    </script>
</body>
</html>
